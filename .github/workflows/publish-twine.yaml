name: Upload Python Package

on:
  push:
  release:
    types: [published]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        name: Install Python
        with:
          python-version: '3.x'
      - name: Download libdiscid
        shell: powershell
        run: |
          Invoke-WebRequest -Uri http://ftp.musicbrainz.org/pub/musicbrainz/libdiscid/libdiscid-0.6.1-win32.zip -OutFile C:\libdiscid.zip -UserAgent [Microsoft.PowerShell.Commands.PSUserAgent]::Chrome
          Expand-Archive -LiteralPath 'C:\libdiscid.zip' -DestinationPath C:\libdiscid\
      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel
      - name: Build wheels
        run: |
          python -m cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: "cp36-* cp37-* cp38-* cp39-*"
          CIBW_ENVIRONMENT: CL="/IC:\libdiscid\libdiscid-0.6.1-win32\libdiscid-0.6.1\include" LINK="/LIBPATH:C\libdiscid\libdiscid-0.6.1-win32"
      - uses: actions/upload-artifact@v2
        with:
          path: dist/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        sudo apt-get install -y libdiscid-dev pkg-config
        python -m pip install --upgrade pip
        pip install setuptools pkgconfig "Cython >= 0.15"
    - name: Build sdist
      run: |
        python setup.py sdist
    - uses: actions/upload-artifact@v2
      with:
        path: dist/*

